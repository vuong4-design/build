name: Build iphoneos-arm

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: macos-14

    env:
      APP_NAME: ${{ secrets.APP_NAME }}
      THEOS: ${{ github.workspace }}/theos
      ARCHS: arm64
      THEOS_PLATFORM: iphoneos

    steps:
      # Checkout repo build (optional)
      - name: Checkout build repo
        uses: actions/checkout@v4

      # Checkout repo touch (private)
      - name: Checkout touch repo
        uses: actions/checkout@v4
        with:
          repository: vuong4-design/X-Cute
          token: ${{ secrets.TOUCH_REPO_TOKEN }}
          path: source

      - name: Install build dependencies
        run: |
          brew update
          brew install ldid dpkg
          echo "DPKG_BIN=$(brew --prefix dpkg)/libexec/dpkg" >> "$GITHUB_ENV"
          echo "$(brew --prefix dpkg)/libexec/dpkg" >> "$GITHUB_PATH"

      - name: Set up Theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git "$THEOS"
          "$THEOS/bin/update-theos"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Install Theos SDKs
        run: |
          TMP_DIR="$(mktemp -d)"
          git clone --depth=1 https://github.com/theos/sdks.git "$TMP_DIR/sdks"
          mkdir -p "$THEOS/sdks"
          cp -R "$TMP_DIR/sdks/"* "$THEOS/sdks/"
          echo "THEOS_SDKS=$THEOS/sdks" >> "$GITHUB_ENV"

          SDK_NAME="$(ls "$THEOS/sdks" | grep -E '^iPhoneOS[0-9]+\.[0-9]+\.sdk$' | sort -V | tail -n 1)"
          SDK_VERSION="${SDK_NAME#iPhoneOS}"
          SDK_VERSION="${SDK_VERSION%.sdk}"

          echo "SDKVERSION=$SDK_VERSION" >> "$GITHUB_ENV"
          echo "TARGET=iphone:clang:$SDK_VERSION:12.0" >> "$GITHUB_ENV"

      - name: Ensure dm.pl is available
        run: |
          if ! command -v dm.pl >/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl -o "$HOME/.local/bin/dm.pl"
            chmod +x "$HOME/.local/bin/dm.pl"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Build main project
        run: |
          cd source
          make clean
          make package ARCHS="$ARCHS" SDKVERSION="$SDKVERSION" TARGET="$TARGET"

      - name: Build and check standalone test tweak
        run: |
          echo "=== Building standalone TestCtorTweak ==="
          cd source/TestCtorTweak
          make clean
          make ARCHS="$ARCHS" SDKVERSION="$SDKVERSION" TARGET="$TARGET"

          echo "=== Checking TestCtorTweak dylib ==="
          TEST_DYLIB=".theos/obj/debug/arm64/TestCtorTweak.dylib"
          if [ ! -f "$TEST_DYLIB" ]; then
            TEST_DYLIB=".theos/obj/arm64/TestCtorTweak.dylib"
          fi

          if [ -f "$TEST_DYLIB" ]; then
            echo "--- File size ---"
            ls -la "$TEST_DYLIB"

            echo "--- otool -l ---"
            otool -l "$TEST_DYLIB" | grep -A10 "__mod_init_func" || echo "NO __mod_init_func"

            echo "--- nm ---"
            nm "$TEST_DYLIB" 2>/dev/null | grep -i "ctor\|init" | head -10
          else
            echo "TestCtorTweak.dylib not found!"
            find . -name "*.dylib"
          fi

      - name: Prepare artifacts for zip
        run: |
          mkdir -p release
      
          # Copy tất cả artifact cần upload vào release/
          cp source/packages/*.deb release/ 2>/dev/null || true
          cp -R source/.theos/obj/**/${APP_NAME}.app release/ 2>/dev/null || true
          cp source/.theos/obj/**/${APP_NAME}Tweak.dylib release/ 2>/dev/null || true
          cp source/.theos/obj/**/${APP_NAME}Daemon release/ 2>/dev/null || true
      
          echo "Files prepared in release/:"
          ls -la release

      - name: Zip artifacts with password
        run: |
          cd release
          zip -r --password "${{ secrets.ARTIFACT_PASSWORD }}" projectx-build.zip .
          echo "Zipped file:"
          ls -la    
      - name: Upload secure artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectx-build
          path: release/projectx-build.zip
          if-no-files-found: warn          
